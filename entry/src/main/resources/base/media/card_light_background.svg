<!-- Converted from card_light_background.xml (layer-list)
     4 layers creating a bordered card with #d6d6d6 border and #FAFAFA body.
     Layer 1: full canvas #d6d6d6
     Layer 2: inset bottom 1dp -> #c0c0c0
     Layer 3: inset bottom 1.5dp -> #d6d6d6
     Layer 4: inset top 0.5dp, bottom 1.5dp, left 0.5dp, right 0.5dp -> #FAFAFA (grey_50)
     On a 100x100 canvas, 1dp ~ 1px, 0.5dp ~ 0.5px -->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Layer 1: full canvas #d6d6d6 -->
  <rect x="0" y="0" width="100" height="100" fill="#d6d6d6"/>
  <!-- Layer 2: inset bottom 1px -> #c0c0c0 -->
  <rect x="0" y="0" width="100" height="99" fill="#c0c0c0"/>
  <!-- Layer 3: inset bottom 1.5px -> #d6d6d6 -->
  <rect x="0" y="0" width="100" height="98.5" fill="#d6d6d6"/>
  <!-- Layer 4: inset top 0.5px, bottom 1.5px, left 0.5px, right 0.5px -> #FAFAFA -->
  <rect x="0.5" y="0.5" width="99" height="98" fill="#FAFAFA"/>
</svg>
